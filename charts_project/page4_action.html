<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行动选择</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>body{margin:0;padding:0;} #main{width:100vw;height:100vh;}</style>
</head>
<body>
    <div id="main"></div>
    <script>
        var chart = echarts.init(document.getElementById('main'));
        var option = {
            title: { text: '面对疑似网暴，你会？', left: 'center', top: '5%' },
            grid: { left: '3%', right: '10%', bottom: '5%', top:'15%', containLabel: true },
            xAxis: { type: 'value', max: 600 },
            yAxis: { type: 'category', data: ['跟风评论', '围观不语', '理性劝解', '举报言论'] },
            series: [
                {
                    type: 'bar',
                    data: [4, 375, 375, 422],
                    itemStyle: {
                        color: function(params) {
                            var colors = ['#ccc', '#FAC858', '#73C0DE', '#EE6666'];
                            return colors[params.dataIndex];
                        }
                    },
                    label: { show: true, position: 'right', formatter: '{c}人' }
                }
            ]
        };
        chart.setOption(option);
        window.onresize = function() { chart.resize(); };
    </script>
</body>
</html>
