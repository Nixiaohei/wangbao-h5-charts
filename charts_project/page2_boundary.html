<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>边界判据</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>body{margin:0;padding:0;} #main{width:100vw;height:100vh;}</style>
</head>
<body>
    <div id="main"></div>
    <script>
        var chart = echarts.init(document.getElementById('main'));
        var option = {
            title: { text: '最核心的判别依据', left: 'center', top: '5%', textStyle:{fontSize:16} },
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            grid: { left: '3%', right: '4%', bottom: '3%', top:'15%', containLabel: true },
            xAxis: { type: 'value', show: false },
            yAxis: { 
                type: 'category', 
                data: ['是否涉及辱骂/造谣', '是否针对外貌/隐私', '是否针对具体事件'],
                axisLabel: { width: 90, overflow: 'break', interval: 0 }
            },
            series: [
                {
                    name: '人数',
                    type: 'bar',
                    data: [150, 180, 264], // 模拟示例数据，按你的CSV Top3填充
                    itemStyle: { 
                        color: new echarts.graphic.LinearGradient(1, 0, 0, 0, [{offset: 0, color: '#91CC75'}, {offset: 1, color: '#3BA272'}])
                    },
                    label: { show: true, position: 'right', formatter: '{c}人' }
                }
            ]
        };
        chart.setOption(option);
        window.onresize = function() { chart.resize(); };
    </script>
</body>
</html>
