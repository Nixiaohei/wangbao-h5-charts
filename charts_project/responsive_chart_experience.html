<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网暴经历</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>body{margin:0;padding:0;background:transparent;} #main{width:100%;height:100vh;}</style>
</head>
<body>
    <div id="main"></div>
    <script>
        var chart = echarts.init(document.getElementById('main'));
        function getOption() {
            var w = window.innerWidth;
            var isMobile = w < 768;
            return {
                title: {
                    text: '48.65%',
                    subtext: '曾遭受过网络攻击',
                    left: 'center',
                    top: 'center',
                    textStyle: { fontSize: isMobile ? 30 : 50, color: '#EE6666', fontWeight: 'bold' },
                    subtextStyle: { fontSize: isMobile ? 14 : 20, color: '#666' }
                },
                series: [{
                    type: 'pie',
                    radius: isMobile ? ['60%', '75%'] : ['50%', '65%'],
                    center: ['50%', '50%'],
                    label: { show: false },
                    data: [
                        { value: 48.65, itemStyle: { color: '#EE6666' } },
                        { value: 51.35, itemStyle: { color: '#E0E0E0' } }
                    ]
                }]
            };
        }
        chart.setOption(getOption());
        window.onresize = function() { chart.resize(); chart.setOption(getOption()); };
    </script>
</body>
</html>
