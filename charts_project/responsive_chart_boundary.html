<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>边界判据</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: transparent; overflow: hidden; }
        #main { width: 100%; height: 100vh; min-height: 400px; }
    </style>
</head>
<body>
    <div id="main"></div>
    <script>
        var chart = echarts.init(document.getElementById('main'));

        function getOption() {
            var width = window.innerWidth;
            var isMobile = width < 768;

            return {
                title: { 
                    text: '区分“批评”与“网暴”的核心标准', 
                    subtext: '数据来源：Q4 (594份样本)',
                    left: 'center', 
                    top: isMobile ? '5%' : '8%',
                    textStyle: { fontSize: isMobile ? 18 : 24, fontWeight: 'bold' },
                    subtextStyle: { fontSize: isMobile ? 12 : 14 }
                },
                tooltip: { 
                    trigger: 'axis', 
                    axisPointer: { type: 'shadow' },
                    confine: true
                },
                grid: { 
                    left: '3%', 
                    right: isMobile ? '15%' : '10%', // 右侧留白给标签
                    bottom: '5%', 
                    top: isMobile ? '25%' : '20%', 
                    containLabel: true 
                },
                xAxis: { type: 'value', show: false },
                yAxis: { 
                    type: 'category', 
                    // 注意：为了让票数最高的排在最上面，这里需要倒序排列
                    data: ['评论区点赞数', '发言者社会地位', '针对具体事件而非个人'], 
                    axisLabel: { 
                        width: isMobile ? 110 : 200, 
                        overflow: 'break', 
                        fontSize: isMobile ? 13 : 16, 
                        interval: 0,
                        lineHeight: 18,
                        color: '#333'
                    },
                    axisLine: { show: false },
                    axisTick: { show: false }
                },
                series: [
                    {
                        name: '认同人数',
                        type: 'bar',
                        barWidth: isMobile ? 20 : 35,
                        // 对应上面Y轴的倒序数据：[44, 57, 464]
                        data: [44, 57, 464], 
                        itemStyle: { 
                            borderRadius: [0, 20, 20, 0],
                            color: function(params) {
                                // 给第一名（最下面这个数据，即464）一个醒目的深色，其他浅色
                                var colors = ['#ddd', '#ccc', '#188df0']; 
                                return colors[params.dataIndex];
                            }
                        },
                        label: { 
                            show: true, 
                            position: 'right', 
                            fontSize: isMobile ? 12 : 14,
                            formatter: '{c}票',
                            color: '#666'
                        }
                    }
                ]
            };
        }

        chart.setOption(getOption());
        window.addEventListener('resize', function() {
            chart.resize();
            chart.setOption(getOption());
        });
    </script>
</body>
</html>
