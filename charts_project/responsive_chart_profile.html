<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>受访者画像</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: transparent; overflow: hidden; }
        #main { width: 100%; height: 100vh; min-height: 400px; }
    </style>
</head>
<body>
    <div id="main"></div>
    <script>
        var chart = echarts.init(document.getElementById('main'));
        
        // 定义响应式配置函数
        function getOption() {
            var width = window.innerWidth;
            var isMobile = width < 768; // 判断是否手机
            
            return {
                title: { 
                    text: '谁在参与讨论？', 
                    left: 'center', 
                    top: isMobile ? '5%' : '10%',
                    textStyle: { fontSize: isMobile ? 18 : 24 }
                },
                tooltip: { trigger: 'item' },
                legend: { 
                    bottom: '5%', 
                    itemGap: 20,
                    textStyle: { fontSize: isMobile ? 12 : 14 }
                },
                series: [
                    {
                        name: '性别',
                        type: 'pie',
                        radius: isMobile ? ['0%', '25%'] : ['0%', '20%'],
                        center: ['50%', '50%'],
                        label: { position: 'inner', formatter: '{b}' },
                        data: [
                            { value: 320, name: '女', itemStyle:{color:'#FF9AA2'} },
                            { value: 274, name: '男', itemStyle:{color:'#73C0DE'} }
                        ]
                    },
                    {
                        name: '年龄',
                        type: 'pie',
                        radius: isMobile ? ['40%', '55%'] : ['35%', '50%'],
                        center: ['50%', '50%'],
                        label: { 
                            show: true, 
                            formatter: '{b}\n{d}%', 
                            fontSize: isMobile ? 12 : 16 
                        },
                        data: [
                            { value: 470, name: '18-30岁', itemStyle:{color:'#91CC75'} },
                            { value: 124, name: '其他', itemStyle:{color:'#eee'} }
                        ]
                    }
                ]
            };
        }

        chart.setOption(getOption());
        
        // 监听窗口大小变化，自动重绘并更新配置
        window.addEventListener('resize', function() {
            chart.resize();
            chart.setOption(getOption());
        });
    </script>
</body>
</html>
