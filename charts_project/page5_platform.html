<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平台责任</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>body{margin:0;padding:0;} #main{width:100vw;height:100vh;}</style>
</head>
<body>
    <div id="main"></div>
    <script>
        var chart = echarts.init(document.getElementById('main'));
        var option = {
            title: { text: '公众期待的平台责任', left: 'center', top: '5%' },
            series: [
                {
                    name: '责任',
                    type: 'funnel',
                    left: '10%', top: '20%', bottom: '10%', width: '80%',
                    min: 0, max: 400,
                    minSize: '0%', maxSize: '100%',
                    sort: 'descending',
                    gap: 2,
                    label: { show: true, position: 'inside', formatter: '{b}' },
                    data: [
                        { value: 376, name: '制定清晰规则' },
                        { value: 350, name: '升级算法拦截' }, // 模拟值
                        { value: 320, name: '优化举报渠道' }  // 模拟值
                    ]
                }
            ]
        };
        chart.setOption(option);
        window.onresize = function() { chart.resize(); };
    </script>
</body>
</html>
